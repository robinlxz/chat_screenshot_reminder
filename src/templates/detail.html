<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-4xl mx-auto py-8 px-4">
        <!-- Header -->
        <header class="mb-8 flex items-center gap-4">
            <a href="/" class="p-2 hover:bg-gray-200 rounded-full transition">
                <i data-lucide="arrow-left" class="w-6 h-6 text-gray-600"></i>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Reminder Details</h1>
            <span v-if="reminder" :class="getStatusBadgeClass(reminder.status)" class="px-3 py-1 rounded-full text-sm font-semibold uppercase ml-auto">
                [[ reminder.status ]]
            </span>
        </header>

        <div v-if="loading" class="text-center py-12">
            Loading...
        </div>

        <div v-else-if="reminder" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Left: Image -->
            <div class="bg-white p-4 rounded-lg shadow-sm">
                <img :src="'/' + reminder.image_path" class="w-full h-auto rounded border border-gray-200">
            </div>

            <!-- Right: Details & Actions -->
            <div class="space-y-6">
                <!-- Extracted Text -->
                <div class="bg-white p-6 rounded-lg shadow-sm">
                    <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-2">Content</h3>
                    <div v-if="editingText">
                        <textarea v-model="editForm.extracted_text" class="w-full border rounded p-2 text-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" rows="4"></textarea>
                        <div class="mt-2 flex gap-2 justify-end">
                            <button @click="editingText = false" class="px-3 py-1 text-sm text-gray-600 hover:bg-gray-100 rounded">Cancel</button>
                            <button @click="saveText" class="px-3 py-1 text-sm bg-blue-500 text-white rounded hover:bg-blue-600">Save</button>
                        </div>
                    </div>
                    <div v-else class="flex justify-between items-start group">
                        <p class="text-gray-800 text-lg">
                            <span v-if="reminder.status === 'processing'" class="italic text-gray-400">Processing with AI...</span>
                            <span v-else>[[ reminder.extracted_text || 'No text extracted' ]]</span>
                        </p>
                        <button @click="startEditText" class="text-gray-400 hover:text-blue-500 opacity-0 group-hover:opacity-100 transition p-1">
                            <i data-lucide="edit-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Time & Status Management -->
                <div class="bg-white p-6 rounded-lg shadow-sm">
                    <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Time & Status</h3>
                    
                    <div class="mb-6 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i data-lucide="clock" class="w-5 h-5 text-gray-500"></i>
                            <span class="text-gray-800 font-medium">
                                [[ formatDateTime(reminder.reminder_time) || 'Not set' ]]
                            </span>
                        </div>
                        
                        <input type="datetime-local" v-model="editForm.reminder_time" @change="saveTime" class="border rounded p-1 text-sm text-gray-700">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button v-if="reminder.status !== 'completed'" @click="updateStatus('completed')" class="flex items-center justify-center gap-2 py-2 px-4 bg-green-50 text-green-700 rounded border border-green-200 hover:bg-green-100 transition font-medium">
                            <i data-lucide="check-circle" class="w-4 h-4"></i> Mark Done
                        </button>
                        
                        <button v-if="['completed', 'expired'].includes(reminder.status)" @click="updateStatus('pending')" class="flex items-center justify-center gap-2 py-2 px-4 bg-blue-50 text-blue-700 rounded border border-blue-200 hover:bg-blue-100 transition font-medium">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Reactivate
                        </button>
                        
                        <button @click="snooze" class="flex items-center justify-center gap-2 py-2 px-4 bg-yellow-50 text-yellow-700 rounded border border-yellow-200 hover:bg-yellow-100 transition font-medium">
                            <i data-lucide="bell-snooze" class="w-4 h-4"></i> Snooze (1h)
                        </button>
                    </div>
                </div>

                <!-- Danger Zone -->
                <div class="bg-white p-6 rounded-lg shadow-sm border border-red-100">
                    <h3 class="text-sm font-semibold text-red-500 uppercase tracking-wider mb-2">Danger Zone</h3>
                    <button @click="deleteReminder" class="text-red-500 hover:text-red-700 font-medium flex items-center gap-2 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> Delete Reminder
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, reactive } = Vue

        const app = createApp({
            setup() {
                const reminderId = "{{ id }}"
                const reminder = ref(null)
                const loading = ref(true)
                const editingText = ref(false)
                
                const editForm = reactive({
                    extracted_text: '',
                    reminder_time: ''
                })

                const fetchReminder = async () => {
                    try {
                        const res = await fetch(`/api/reminder/${reminderId}`)
                        if (res.ok) {
                            const data = await res.json()
                            reminder.value = data
                            editForm.extracted_text = data.extracted_text || ''
                            
                            // Format for datetime-local input (YYYY-MM-DDThh:mm)
                            if (data.reminder_time) {
                                // Add Z to ensure local timezone parsing, then format back
                                const d = new Date(data.reminder_time + 'Z')
                                const tzoffset = (new Date()).getTimezoneOffset() * 60000;
                                const localISOTime = (new Date(d - tzoffset)).toISOString().slice(0, 16);
                                editForm.reminder_time = localISOTime
                            }
                            
                            setTimeout(() => lucide.createIcons(), 50)
                        } else {
                            alert('Failed to load reminder')
                            window.location.href = '/'
                        }
                    } catch (e) {
                        console.error(e)
                    } finally {
                        loading.value = false
                    }
                }

                const updateReminder = async (payload) => {
                    try {
                        const res = await fetch(`/api/reminder/${reminderId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        })
                        if (res.ok) {
                            const data = await res.json()
                            reminder.value = data.reminder
                        }
                    } catch (e) {
                        console.error(e)
                    }
                }

                const updateStatus = (status) => updateReminder({ status })

                const startEditText = () => {
                    editForm.extracted_text = reminder.value.extracted_text || ''
                    editingText.value = true
                }

                const saveText = async () => {
                    await updateReminder({ extracted_text: editForm.extracted_text })
                    editingText.value = false
                }

                const saveTime = async () => {
                    if(!editForm.reminder_time) {
                        await updateReminder({ reminder_time: null })
                        return
                    }
                    // Convert local input to UTC ISO string for backend
                    const d = new Date(editForm.reminder_time)
                    const utcIso = d.toISOString()
                    await updateReminder({ reminder_time: utcIso, status: 'pending' })
                }

                const snooze = async () => {
                    let baseTime = reminder.value.reminder_time ? new Date(reminder.value.reminder_time + 'Z') : new Date()
                    // Add 1 hour
                    baseTime.setHours(baseTime.getHours() + 1)
                    await updateReminder({ 
                        reminder_time: baseTime.toISOString(),
                        status: 'pending'
                    })
                    // Update input field
                    const tzoffset = (new Date()).getTimezoneOffset() * 60000;
                    editForm.reminder_time = (new Date(baseTime - tzoffset)).toISOString().slice(0, 16);
                }

                const deleteReminder = async () => {
                    if(confirm('Are you sure you want to delete this reminder?')) {
                        try {
                            const res = await fetch(`/api/reminder/${reminderId}`, { method: 'DELETE' })
                            if(res.ok) window.location.href = '/'
                        } catch(e) {
                            console.error(e)
                        }
                    }
                }

                const getStatusBadgeClass = (status) => {
                    const map = {
                        'processing': 'bg-gray-100 text-gray-600',
                        'pending': 'bg-blue-100 text-blue-600',
                        'expired': 'bg-red-100 text-red-600',
                        'completed': 'bg-green-100 text-green-600',
                        'snoozed': 'bg-yellow-100 text-yellow-600'
                    }
                    return map[status] || 'bg-gray-100 text-gray-600'
                }

                const formatDateTime = (isoString) => {
                    if(!isoString) return ''
                    const d = new Date(isoString + 'Z')
                    return d.toLocaleString()
                }

                onMounted(() => {
                    fetchReminder()
                })

                return {
                    reminder, loading, editingText, editForm,
                    updateStatus, startEditText, saveText, saveTime, snooze, deleteReminder,
                    getStatusBadgeClass, formatDateTime
                }
            }
        })
        
        app.config.compilerOptions.delimiters = ['[[', ']]']
        app.mount('#app')
    </script>
</body>
</html>
