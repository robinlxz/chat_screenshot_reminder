<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Chat Screenshot Reminder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-4xl mx-auto py-8 px-4">
        <header class="mb-8 flex items-center gap-4">
            <a href="/" class="p-2 hover:bg-gray-200 rounded-full transition">
                <i data-lucide="arrow-left" class="w-6 h-6 text-gray-600"></i>
            </a>
            <h1 class="text-3xl font-bold text-blue-600">Admin Dashboard</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase tracking-wider mb-1">Total Users</h3>
                <p class="text-3xl font-bold text-gray-800">[[ stats.length ]]</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase tracking-wider mb-1">Total Reminders</h3>
                <p class="text-3xl font-bold text-gray-800">[[ totalTasks ]]</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">User Statistics</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr>
                            <th class="px-6 py-3 border-b border-gray-200 bg-gray-50 text-xs font-semibold text-gray-600 uppercase tracking-wider">Nickname</th>
                            <th class="px-6 py-3 border-b border-gray-200 bg-gray-50 text-xs font-semibold text-gray-600 uppercase tracking-wider">Total Reminders</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr v-if="loading">
                            <td colspan="2" class="px-6 py-8 text-center text-gray-500">Loading statistics...</td>
                        </tr>
                        <tr v-else-if="stats.length === 0">
                            <td colspan="2" class="px-6 py-8 text-center text-gray-500">No data available.</td>
                        </tr>
                        <tr v-for="user in stats" :key="user.nickname" class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="h-8 w-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm mr-3">
                                        [[ user.nickname.charAt(0).toUpperCase() ]]
                                    </div>
                                    <div class="text-sm font-medium text-gray-900">[[ user.nickname ]]</div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                    [[ user.task_count ]] tasks
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue

        const app = createApp({
            setup() {
                const stats = ref([])
                const loading = ref(true)

                const totalTasks = computed(() => {
                    return stats.value.reduce((sum, user) => sum + user.task_count, 0)
                })

                const fetchStats = async () => {
                    try {
                        const res = await fetch('/api/stats')
                        if(res.ok) {
                            const data = await res.json()
                            // Sort by task count descending
                            stats.value = data.stats.sort((a, b) => b.task_count - a.task_count)
                        } else if (res.status === 403) {
                            alert('Forbidden: You must be logged in as admin to view this page.')
                            window.location.href = '/'
                        }
                    } catch (e) {
                        console.error('Failed to fetch stats', e)
                    } finally {
                        loading.value = false
                    }
                }

                onMounted(() => {
                    fetchStats()
                    setTimeout(() => lucide.createIcons(), 100)
                })

                return {
                    stats, loading, totalTasks
                }
            }
        })
        
        app.config.compilerOptions.delimiters = ['[[', ']]']
        app.mount('#app')
    </script>
</body>
</html>
